name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '22'

jobs:
  desktop:
    name: Desktop (EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci
        working-directory: desktop

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'FlowDeck ${{ github.ref_name }}'
          releaseBody: |
            ## FlowDeck ${{ github.ref_name }}

            ### Downloads
            - **Windows**: `.exe` installer, `.msi` installer
            - **Android**: `.apk` (see Mobile job artifacts)
          releaseDraft: true
          includeDebug: false
          projectPath: desktop

  mobile:
    name: Mobile (APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Prebuild for Android
        run: npx expo prebuild --platform android
        working-directory: mobile

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
        shell: bash
        working-directory: mobile/android

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
        shell: bash
        working-directory: mobile/android

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/android/app/build/outputs/apk/release/*.apk
